version: '3.8'

services:

  # Node.js Instance 1
  node-app-1:
    build: .
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL}
      - PORT=5000
    depends_on:
      - redis
    networks:
      - app-network

  # Node.js Instance 2
  node-app-2:
    build: .
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL}
      - PORT=5000
    depends_on:
      - redis
    networks:
      - app-network

  # Node.js Instance 3
  node-app-3:
    build: .
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL}
      - PORT=5000
    depends_on:
      - redis
    networks:
      - app-network

  # Redis
  redis:
    image: redis:alpine
    networks:
      - app-network

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - node-app-1
      - node-app-2
      - node-app-3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge